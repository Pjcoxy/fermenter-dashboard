name: Fetch RAPT Data

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get RAPT access token
        id: auth
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST "https://id.rapt.io/connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=rapt-user&grant_type=password&username=${{ secrets.RAPT_USERNAME }}&password=${{ secrets.RAPT_API_SECRET }}")

          TOKEN=$(echo "$TOKEN_RESPONSE" | grep -o '"access_token":"[^"]*' | cut -d'"' -f4)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch RAPT telemetry for both Pills
        id: fetch_data
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"

          # Get all Hydrometers
          PILLS=$(curl -s -X GET "https://api.rapt.io/api/Hydrometers/GetHydrometers" \
            -H "Authorization: Bearer $TOKEN")

          echo "response=$PILLS" >> $GITHUB_OUTPUT

      - name: Update data.json
        env:
          PILLS_DATA: ${{ steps.fetch_data.outputs.response }}
        run: |
          python3 << 'PYTHON_EOF'
          import json
          import os
          from datetime import datetime

          # Parse RAPT API response from environment variable
          pills_data = json.loads(os.environ['PILLS_DATA'])

          # Find the two active Pills
          reddy_pill = next((p for p in pills_data if p['id'] == 'b593f1b8-8c3d-4f5e-a798-6e7a3569a85b'), None)
          yellow_pill = next((p for p in pills_data if p['id'] == '176cc4c3-9e13-4106-b1c0-7455b4f9ca7c'), None)

          # Build data structure
          data = {
              "pills": [
                  {
                      "name": reddy_pill['name'] if reddy_pill else "reddymc redface",
                      "id": "b593f1b8-8c3d-4f5e-a798-6e7a3569a85b",
                      "temperature": reddy_pill['temperature'] if reddy_pill else None,
                      "gravity": reddy_pill['gravity'] if reddy_pill else None,
                      "battery": reddy_pill['battery'] if reddy_pill else None
                  },
                  {
                      "name": yellow_pill['name'] if yellow_pill else "yellow mc yellow face",
                      "id": "176cc4c3-9e13-4106-b1c0-7455b4f9ca7c",
                      "temperature": yellow_pill['temperature'] if yellow_pill else None,
                      "gravity": yellow_pill['gravity'] if yellow_pill else None,
                      "battery": yellow_pill['battery'] if yellow_pill else None
                  }
              ],
              "lastUpdated": datetime.utcnow().isoformat() + "Z"
          }

          # Write to data.json
          with open('data.json', 'w') as f:
              json.dump(data, f, indent=2)

          print("Updated data.json")
          with open('data.json', 'r') as f:
              print(f.read())
          PYTHON_EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Only commit if data.json changed
          if git diff --quiet data.json; then
            echo "No changes to commit"
          else
            git add data.json
            git commit -m "Update fermenter data: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fermenter Dashboard | RAPT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.5);
            padding: 60px 40px 40px;
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #1a1a2e;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #888;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .pills-container {
            position: relative;
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
            gap: 0;
        }

        .pills-image {
            max-width: 100%;
            height: auto;
            display: block;
            width: 100%;
        }

        .pill-data {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            font-weight: 700;
        }

        .pill-data.reddy {
            left: 12%;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
        }

        .pill-data.yellow {
            right: 12%;
            top: 50%;
            transform: translateY(-50%);
            color: #333;
        }

        .metric-item {
            text-align: center;
        }

        .metric-label {
            font-size: 10px;
            opacity: 0.85;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .metric-value {
            font-size: 22px;
            line-height: 1;
            font-weight: 800;
            font-family: 'Monaco', 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .status-box {
            background: linear-gradient(135deg, #f8f9fa 0%, #fff 100%);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #e8e8e8;
            margin-bottom: 20px;
        }

        .status-label {
            font-size: 11px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .status-content {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 20px;
        }

        .status-time {
            font-size: 14px;
            color: #1a1a2e;
            font-weight: 600;
        }

        .status-ago {
            font-size: 12px;
            color: #999;
            font-weight: 500;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 16px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px 25px;
            }

            .pill-data.reddy {
                left: 8%;
            }

            .pill-data.yellow {
                right: 8%;
            }

            .metric-value {
                font-size: 18px;
            }

            .metric-label {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍺 Fermenter Dashboard</h1>
            <p class="subtitle">Real-time RAPT Telemetry</p>
        </div>

        <div class="pills-container">
            <img src="red and yellow.webp" alt="RAPT Pills" class="pills-image" id="pills-image">

            <div class="pill-data reddy" id="reddy-data">
                <div class="metric-item">
                    <div class="metric-label">Temp</div>
                    <div class="metric-value" id="temp-reddy">--</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">Gravity</div>
                    <div class="metric-value" id="gravity-reddy">--</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">Battery</div>
                    <div class="metric-value" id="battery-reddy">--</div>
                </div>
            </div>

            <div class="pill-data yellow" id="yellow-data">
                <div class="metric-item">
                    <div class="metric-label">Temp</div>
                    <div class="metric-value" id="temp-yellow">--</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">Gravity</div>
                    <div class="metric-value" id="gravity-yellow">--</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">Battery</div>
                    <div class="metric-value" id="battery-yellow">--</div>
                </div>
            </div>
        </div>

        <div class="status-box">
            <div class="status-label">Last Updated</div>
            <div class="status-content">
                <div class="status-time" id="lastUpdated-time">--</div>
                <div class="status-ago" id="lastUpdated-ago">--</div>
            </div>
        </div>

        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        let allData = null;

        function updateDisplay() {
            if (!allData || !allData.pills) return;

            const reddy = allData.pills[0];
            const yellow = allData.pills[1];

            // Update reddy pill
            document.getElementById('temp-reddy').textContent =
                reddy.temperature !== null ? `${reddy.temperature}°` : '--';
            document.getElementById('gravity-reddy').textContent =
                reddy.gravity !== null ? reddy.gravity.toFixed(1) : '--';
            document.getElementById('battery-reddy').textContent =
                reddy.battery !== null ? `${reddy.battery.toFixed(0)}%` : '--';

            // Update yellow pill
            document.getElementById('temp-yellow').textContent =
                yellow.temperature !== null ? `${yellow.temperature}°` : '--';
            document.getElementById('gravity-yellow').textContent =
                yellow.gravity !== null ? yellow.gravity.toFixed(1) : '--';
            document.getElementById('battery-yellow').textContent =
                yellow.battery !== null ? `${yellow.battery.toFixed(0)}%` : '--';

            // Update timestamp
            const lastUpdate = new Date(allData.lastUpdated);
            const now = new Date();
            const diffMinutes = Math.floor((now - lastUpdate) / 60000);

            const formatter = new Intl.DateTimeFormat('en-AU', {
                timeZone: 'Australia/Perth',
                day: '2-digit',
                month: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
            const perthTimeStr = formatter.format(lastUpdate) + ' AWST';

            let agoStr = '';
            if (diffMinutes < 1) {
                agoStr = 'Just now';
            } else if (diffMinutes < 60) {
                agoStr = `${diffMinutes}m ago`;
            } else if (diffMinutes < 1440) {
                const hours = Math.floor(diffMinutes / 60);
                agoStr = `${hours}h ago`;
            } else {
                const days = Math.floor(diffMinutes / 1440);
                agoStr = `${days}d ago`;
            }

            document.getElementById('lastUpdated-time').textContent = perthTimeStr;
            document.getElementById('lastUpdated-ago').textContent = agoStr;
            document.getElementById('error').style.display = 'none';
        }

        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                allData = await response.json();
                updateDisplay();
            } catch (err) {
                console.error('Error loading data:', err);
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error loading data: ${err.message}`;
            }
        }

        loadData();
        setInterval(loadData, 30000);
        setInterval(updateDisplay, 1000);
    </script>
</body>
</html>

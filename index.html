<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPT Fermenter Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1629 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            padding: 15px 0;
            gap: 25px;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(100, 150, 255, 0.3), transparent);
        }

        .header-logo-section {
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        .rapt-logo {
            height: 75px;
            width: auto;
            max-width: 350px;
            display: block;
            filter: invert(1);
        }

        .header-title-section {
            flex-shrink: 0;
            text-align: left;
        }

        .logo {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #e0e0e0;
            font-weight: 600;
            margin: 0;
            line-height: 1;
        }

        h1 {
            font-size: 38px;
            font-weight: 300;
            letter-spacing: -1px;
            margin: 0;
            color: #e0e0e0;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 11px;
            color: #e0e0e0;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0;
            font-weight: 500;
            line-height: 1;
        }

        .brewer-name {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #e0e0e0;
            text-transform: uppercase;
            margin: 0 0 5px 0;
            line-height: 1;
        }

        /* Pills Grid */
        .pills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .pill-card {
            background: linear-gradient(135deg, rgba(30, 50, 90, 0.6) 0%, rgba(15, 25, 50, 0.8) 100%);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .pill-card:hover {
            border-color: rgba(100, 150, 255, 0.4);
            background: linear-gradient(135deg, rgba(30, 50, 90, 0.8) 0%, rgba(15, 25, 50, 0.9) 100%);
        }

        .pill-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(100, 150, 255, 0.3), transparent);
        }

        .pill-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .pill-indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .pill-indicator.reddy {
            background: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .pill-indicator.yellow {
            background: #ffd93d;
            box-shadow: 0 0 20px rgba(255, 217, 61, 0.5);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .pill-name {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .pill-status {
            margin-left: auto;
            font-size: 11px;
            padding: 6px 12px;
            background: rgba(100, 200, 100, 0.2);
            color: #7ff593;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .metric-box {
            background: rgba(20, 40, 70, 0.4);
            border: 1px solid rgba(100, 150, 255, 0.15);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .metric-box:hover {
            background: rgba(20, 40, 70, 0.6);
            border-color: rgba(100, 150, 255, 0.3);
        }

        .metric-box::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(100, 150, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .metric-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #6496ff 0%, #a0d8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .metric-unit {
            font-size: 12px;
            color: #666;
            font-weight: 400;
        }

        .metric-trend {
            font-size: 11px;
            margin-top: 8px;
            color: #7ff593;
            font-weight: 600;
        }

        .metric-trend.down {
            color: #ff6b6b;
        }

        /* Status Section */
        .status-section {
            background: linear-gradient(135deg, rgba(30, 50, 90, 0.4) 0%, rgba(15, 25, 50, 0.6) 100%);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(100, 150, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .status-text {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .status-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            font-weight: 600;
        }

        .status-value {
            font-size: 14px;
            font-weight: 500;
            color: #e0e0e0;
        }

        .status-timestamp {
            font-size: 12px;
            color: #666;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pill-card {
            animation: fadeIn 0.6s ease-out;
        }

        .pill-card:nth-child(2) {
            animation-delay: 0.1s;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }

            .pills-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .pill-card {
                padding: 30px;
            }

            .status-section {
                flex-direction: column;
                align-items: flex-start;
            }

            .metric-value {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .pill-card {
                padding: 20px;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .metric-value {
                font-size: 20px;
            }

            .status-section {
                padding: 20px;
            }
        }

        .error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff9999;
            padding: 16px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-logo-section">
                <img src="https://raw.githubusercontent.com/Pjcoxy/fermenter-dashboard/main/rapt.png" alt="RAPT" class="rapt-logo">
            </div>
            <div class="header-title-section">
                <h1>Fermenter Dashboard</h1>
                <p class="subtitle">Real-time telemetry and analytics</p>
            </div>
        </div>

        <div class="pills-grid">
            <!-- Reddy Pill -->
            <div class="pill-card">
                <div class="pill-header">
                    <div class="pill-indicator reddy"></div>
                    <div class="pill-name" id="reddy-name">--</div>
                    <div class="pill-status">Active</div>
                </div>

                <div class="metrics-grid">
                    <div class="metric-box">
                        <div class="metric-label">Temperature</div>
                        <div class="metric-value" id="temp-reddy">--</div>
                        <div class="metric-unit">°C</div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-label">Gravity</div>
                        <div class="metric-value" id="gravity-reddy">--</div>
                        <div class="metric-unit">SG</div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-label">Battery</div>
                        <div class="metric-value" id="battery-reddy">--</div>
                        <div class="metric-unit">%</div>
                    </div>
                </div>
            </div>

            <!-- Yellow Pill -->
            <div class="pill-card">
                <div class="pill-header">
                    <div class="pill-indicator yellow"></div>
                    <div class="pill-name" id="yellow-name">--</div>
                    <div class="pill-status">Active</div>
                </div>

                <div class="metrics-grid">
                    <div class="metric-box">
                        <div class="metric-label">Temperature</div>
                        <div class="metric-value" id="temp-yellow">--</div>
                        <div class="metric-unit">°C</div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-label">Gravity</div>
                        <div class="metric-value" id="gravity-yellow">--</div>
                        <div class="metric-unit">SG</div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-label">Battery</div>
                        <div class="metric-value" id="battery-yellow">--</div>
                        <div class="metric-unit">%</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="status-section">
            <div class="status-item">
                <div class="status-icon">📊</div>
                <div class="status-text">
                    <div class="status-label">Last Updated</div>
                    <div class="status-value" id="lastUpdated-time">--</div>
                    <div class="status-timestamp" id="lastUpdated-ago">--</div>
                </div>
            </div>
            <div class="status-item">
                <div class="status-icon">🔄</div>
                <div class="status-text">
                    <div class="status-label">Update Frequency</div>
                    <div class="status-value">Every 15 minutes</div>
                </div>
            </div>
            <div class="status-item">
                <div class="status-icon">✓</div>
                <div class="status-text">
                    <div class="status-label">System Status</div>
                    <div class="status-value" style="color: #7ff593;">Operating Normally</div>
                </div>
            </div>
        </div>

        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        let allData = null;

        function updateDisplay() {
            if (!allData || !allData.pills) return;

            const reddy = allData.pills[0];
            const yellow = allData.pills[1];

            // Reddy
            document.getElementById('reddy-name').textContent = reddy.name || 'reddymc redface';
            document.getElementById('temp-reddy').textContent =
                reddy.temperature !== null ? reddy.temperature.toFixed(2) : '--';
            document.getElementById('gravity-reddy').textContent =
                reddy.gravity !== null ? reddy.gravity.toFixed(2) : '--';
            document.getElementById('battery-reddy').textContent =
                reddy.battery !== null ? reddy.battery.toFixed(0) : '--';

            // Yellow
            document.getElementById('yellow-name').textContent = yellow.name || 'yellow mc yellow face';
            document.getElementById('temp-yellow').textContent =
                yellow.temperature !== null ? yellow.temperature.toFixed(2) : '--';
            document.getElementById('gravity-yellow').textContent =
                yellow.gravity !== null ? yellow.gravity.toFixed(2) : '--';
            document.getElementById('battery-yellow').textContent =
                yellow.battery !== null ? yellow.battery.toFixed(0) : '--';

            // Timestamp
            const lastUpdate = new Date(allData.lastUpdated);
            const now = new Date();
            const diffMinutes = Math.floor((now - lastUpdate) / 60000);

            const formatter = new Intl.DateTimeFormat('en-AU', {
                timeZone: 'Australia/Perth',
                day: '2-digit',
                month: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
            const perthTimeStr = formatter.format(lastUpdate) + ' AWST';

            let agoStr = '';
            if (diffMinutes < 1) {
                agoStr = 'Just now';
            } else if (diffMinutes < 60) {
                agoStr = `${diffMinutes} minute${diffMinutes !== 1 ? 's' : ''} ago`;
            } else if (diffMinutes < 1440) {
                const hours = Math.floor(diffMinutes / 60);
                agoStr = `${hours} hour${hours !== 1 ? 's' : ''} ago`;
            } else {
                const days = Math.floor(diffMinutes / 1440);
                agoStr = `${days} day${days !== 1 ? 's' : ''} ago`;
            }

            document.getElementById('lastUpdated-time').textContent = perthTimeStr;
            document.getElementById('lastUpdated-ago').textContent = agoStr;
            document.getElementById('error').style.display = 'none';
        }

        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                allData = await response.json();
                updateDisplay();
            } catch (err) {
                console.error('Error loading data:', err);
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error loading data: ${err.message}`;
            }
        }

        loadData();
        setInterval(loadData, 30000);
        setInterval(updateDisplay, 1000);
    </script>
</body>
</html>

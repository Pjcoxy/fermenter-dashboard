<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fermenter Temperature Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #666;
            font-size: 16px;
            font-weight: 500;
        }

        .metric-value {
            color: #333;
            font-size: 32px;
            font-weight: bold;
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .status {
            margin-top: 30px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
        }

        .status-label {
            font-weight: 600;
            color: #333;
        }

        .loading {
            text-align: center;
            color: #999;
            font-size: 14px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 15px 20px;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn:hover {
            color: #333;
            background: #f9f9f9;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍺 Fermenter Dashboard</h1>
        <p class="subtitle">Real-time temperature and gravity monitoring</p>

        <div style="margin-bottom: 30px;">
            <div style="display: flex; gap: 10px; border-bottom: 2px solid #eee;">
                <button id="tab-reddy" class="tab-btn active" onclick="switchPill('reddy')">
                    reddymc redface
                </button>
                <button id="tab-yellow" class="tab-btn" onclick="switchPill('yellow')">
                    yellow mc yellow face
                </button>
            </div>
        </div>

        <div class="metric">
            <span class="metric-label">Temperature</span>
            <span class="metric-value" id="temperature">--</span>
        </div>

        <div class="metric">
            <span class="metric-label">Gravity</span>
            <span class="metric-value" id="gravity">--</span>
        </div>

        <div class="metric">
            <span class="metric-label">Battery</span>
            <span class="metric-value" id="battery">--</span>
        </div>

        <div class="status">
            <div class="status-label">Last Updated</div>
            <div id="lastUpdated">Loading...</div>
        </div>

        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        let currentPill = 'reddy';
        let allData = null;

        function switchPill(pill) {
            currentPill = pill;

            // Update tab buttons
            document.getElementById('tab-reddy').classList.toggle('active', pill === 'reddy');
            document.getElementById('tab-yellow').classList.toggle('active', pill === 'yellow');

            // Update display
            updateDisplay();
        }

        function updateDisplay() {
            if (!allData || !allData.pills) return;

            const pillIndex = currentPill === 'reddy' ? 0 : 1;
            const pill = allData.pills[pillIndex];

            if (!pill) return;

            // Update metrics
            document.getElementById('temperature').textContent =
                pill.temperature !== null ? `${pill.temperature}°C` : '--';
            document.getElementById('gravity').textContent =
                pill.gravity !== null ? pill.gravity.toFixed(4) : '--';
            document.getElementById('battery').textContent =
                pill.battery !== null ? `${pill.battery.toFixed(1)}%` : '--';

            // Format last updated time
            const lastUpdate = new Date(allData.lastUpdated);
            const now = new Date();
            const diffMinutes = Math.floor((now - lastUpdate) / 60000);

            let timeStr = '';
            if (diffMinutes < 1) {
                timeStr = 'Just now';
            } else if (diffMinutes < 60) {
                timeStr = `${diffMinutes} minute${diffMinutes !== 1 ? 's' : ''} ago`;
            } else if (diffMinutes < 1440) {
                const hours = Math.floor(diffMinutes / 60);
                timeStr = `${hours} hour${hours !== 1 ? 's' : ''} ago`;
            } else {
                timeStr = lastUpdate.toLocaleString();
            }

            document.getElementById('lastUpdated').textContent = timeStr;
            document.getElementById('error').style.display = 'none';
        }

        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                allData = await response.json();
                updateDisplay();
            } catch (err) {
                console.error('Error loading data:', err);
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error loading data: ${err.message}`;
            }
        }

        // Load data on page load
        loadData();

        // Refresh data every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
